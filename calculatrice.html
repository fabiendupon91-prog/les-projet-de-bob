<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calculatrice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="calculator">
    <h1>Calculatrice</h1>

    <input type="text" id="display" disabled>

    <div class="buttons">
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button>/</button>

      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button>*</button>

      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button>-</button>

      <button>0</button>
      <button>.</button>
      <button id="equals">=</button>
      <button>+</button>

      <button id="clear">C</button>
      <button id="backspace">⌫</button>
    </div>
    <br><br>
    <a href="index.html">Petit retour</a>
  </div>

  <script src="calculatrice.js"></script>
</body>
</html>
